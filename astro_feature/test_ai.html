<!-- Swiss Ephemeris WASM — files live in sweph-wasm/js/ -->
<script>
  window.Module = {
    // Tell the loader where to fetch astro.wasm  &  astro.data
    locateFile: p => `sweph-wasm/js/${p}`,
    onRuntimeInitialized: () => {
      // 当 WASM & data 成功加载后再绑按钮与初算
      const btn = document.getElementById('calc-btn');
      btn?.addEventListener('click', calcSun);
      calcSun();
    }
  };
</script>
<script src="sweph-wasm/js/astro.js"></script>
<script>
/* === Helper utilities === */
const SIGNS = ['白羊','金牛','雙子','巨蟹','獅子','處女',
               '天秤','天蠍','射手','摩羯','水瓶','雙魚'];
function degreeToSign(deg){
  const norm = ((deg % 360) + 360) % 360;
  return SIGNS[Math.floor(norm/30)];
}
function dms(deg){
  const d=Math.floor(deg), m=Math.floor((deg-d)*60),
        s=((deg-d-m/60)*3600).toFixed(1);
  return `${d}°${m}′${s}″`;
}

/* === Main calculation (Sun only) === */
function calcSun(){
  const dateStr = document.getElementById('date').value;
  const timeStr = document.getElementById('time').value || '00:00:00';
  const dt = new Date(`${dateStr}T${timeStr}`);

  /* ---- 1. Julian Day (UT) ---- */
  const jd = Module.ccall('swe_julday','number',
              ['number','number','number','number','number'],
              [dt.getUTCFullYear(),
               dt.getUTCMonth()+1,
               dt.getUTCDate(),
               dt.getUTCHours() + dt.getUTCMinutes()/60 + dt.getUTCSeconds()/3600,
               1]);                                  // 1 = Gregorian calendar

  /* ---- 2. Call _swe_calc_ut for the Sun ---- */
  const SE_SUN = 0;
  const SEFLG_SWIEPH = 2;
  const ptr = Module._malloc(6 * 8);                 // 6 doubles
  Module.ccall('swe_calc_ut','number',
               ['number','number','number','number'],
               [jd, SE_SUN, SEFLG_SWIEPH, ptr]);

  const res = new Float64Array(Module.HEAPF64.buffer, ptr, 6);
  const lon = res[0];
  Module._free(ptr);

  /* ---- 3. Output ---- */
  document.getElementById('result').innerText =
    `☉ 太陽：${degreeToSign(lon)} ${dms(((lon%30)+30)%30)}  (真黃經 ${lon.toFixed(2)}°)`;
}

// (removed redundant Module.onRuntimeInitialized re-binding)
</script>
<script>
  // === Collapsible toggle ===
  document.getElementById('toggle-json').addEventListener('click', function(){
    const panel = document.getElementById('json-panel');
    panel.classList.toggle('open');
    this.innerHTML = panel.classList.contains('open')
      ? '⬆️ 收起可複製星盤文本 (LLM-friendly)'
      : '➡️ 展開可複製星盤文本 (LLM-friendly)';
  });
</script>
